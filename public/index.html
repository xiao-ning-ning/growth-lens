<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成长力场</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@600;700&display=swap');

:root {
  --bg: #06070b;
  --bg2: #0c0d14;
  --card: #11121c;
  --card2: #181a28;
  --card3: #1e2033;
  --border: #1f2140;
  --border-light: #3d4270;
  --text: #f0f0f5;
  --text2: #b8b8c8;
  --text3: #7a7a90;
  --accent: #7c6cf0;
  --accent2: #b0a8ff;
  --green: #2dd4bf;
  --green2: #5eead4;
  --orange: #fbbf24;
  --red: #f87171;
  --pink: #f472b6;
  --blue: #60a5fa;
  --teal: #67e8f9;
  --glow-accent: rgba(124,108,240,0.15);
  --glow-green: rgba(45,212,191,0.12);
  --glow-red: rgba(248,113,113,0.12);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.2);
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== LOGIN ===== */
.login-page {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--bg);
}
.login-box {
  background: rgba(20, 21, 30, 0.85);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 40px 36px;
  width: 380px;
  backdrop-filter: blur(30px);
}
.login-brand { text-align: center; margin-bottom: 32px; }
.login-icon { font-size: 48px; margin-bottom: 8px; }
.login-brand h1 {
  font-size: 28px; font-weight: 900; margin: 0;
  background: linear-gradient(135deg, #d8d4ff, #5eead4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.login-brand p { font-size: 13px; color: var(--text3); margin: 4px 0 0; }
.login-form { display: flex; flex-direction: column; gap: 16px; }
.login-field label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.login-field input {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.04);
  color: var(--text); font-size: 14px; outline: none;
  transition: border-color 0.2s;
  -webkit-autofill-selected: transparent;
}
.login-field input:focus { border-color: var(--accent); }
.login-error {
  font-size: 13px; color: #f87171; text-align: center;
  padding: 8px; border-radius: 8px; background: rgba(248,113,113,0.08);
}
.login-form button[type="submit"] {
  padding: 12px; border: none; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: opacity 0.2s;
}
.login-form button[type="submit"]:hover { opacity: 0.9; }
.login-form button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
.login-hint { text-align: center; font-size: 12px; color: var(--text3); margin-top: 20px; }
.sidebar-logout {
  display: block; width: 100%; padding: 10px 22px;
  background: none; border: none; border-top: 1px solid var(--border);
  color: var(--text3); font-size: 12px; cursor: pointer; text-align: left;
  transition: color 0.2s;
}
.sidebar-logout:hover { color: var(--text2); }

/* ===== LAYOUT ===== */
.app { display: flex; height: 100vh; }

.sidebar {
  width: 224px;
  background: linear-gradient(180deg, rgba(12,13,20,0.95), rgba(8,9,15,0.98));
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  z-index: 10;
}

.sidebar-brand {
  padding: 28px 22px 22px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.sidebar-brand::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 22px; right: 22px;
  height: 1px;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity: 0.3;
}

.sidebar-brand h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px;
  font-weight: 900;
  background: linear-gradient(135deg, #fff 0%, var(--accent2) 50%, var(--green2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
  letter-spacing: 1px;
}

.sidebar-brand p {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.sidebar-nav { flex: 1; padding: 14px 10px; overflow-y: auto; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  color: var(--text3);
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 2px;
  position: relative;
}
.nav-item:hover {
  background: rgba(124,108,240,0.08);
  color: var(--text2);
  transform: translateX(2px);
}
.nav-item.active {
  background: linear-gradient(135deg, rgba(124,108,240,0.14), rgba(124,108,240,0.06));
  color: var(--accent2);
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 20px;
  border-radius: 0 3px 3px 0;
  background: var(--accent);
  box-shadow: 0 0 12px var(--glow-accent);
}
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; transition: transform 0.2s; }
.nav-item:hover .icon { transform: scale(1.15); }
.nav-item.active .icon { filter: drop-shadow(0 0 4px var(--accent)); }

.sidebar-footer {
  padding: 16px 22px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.5px;
}
.sidebar-queue {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  min-height: 0;
}
.sidebar-queue-title {
  font-size: 10px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.sidebar-queue-title .pulse {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.5s ease infinite;
  display: none;
}
.sidebar-queue-title .pulse.active { display: inline-block; }
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}
.queue-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  margin-bottom: 6px;
  font-size: 11px;
}
.queue-item-label {
  color: var(--text2);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.queue-item-label .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.queue-item-label .dot.running { background: var(--accent); animation: pulse 1s ease infinite; }
.queue-item-label .dot.done { background: var(--green); }
.queue-item-label .dot.error { background: var(--red); }
.queue-progress {
  width: 100%;
  height: 3px;
  border-radius: 3px;
  background: var(--card2);
  overflow: hidden;
}
.queue-progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.4s ease;
}
.queue-progress-fill.done { background: var(--green); }
.queue-progress-fill.error { background: var(--red); }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.btn {
  padding: 8px 18px;
  border-radius: var(--radius-xs);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  transition: var(--transition);
  font-family: inherit;
}
.btn:hover { border-color: var(--accent); color: var(--text); background: var(--card2); }
.btn.primary {
  background: linear-gradient(135deg, var(--accent), #6366f1);
  border-color: transparent;
  color: #fff;
  box-shadow: 0 2px 12px rgba(124,108,240,0.3);
}
.btn.primary:hover {
  box-shadow: 0 4px 20px rgba(124,108,240,0.45);
  transform: translateY(-1px);
}
.btn.danger { border-color: rgba(248,113,113,0.3); color: var(--red); }
.btn.danger:hover { background: var(--glow-red); border-color: var(--red); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

.content {
  flex: 1;
  overflow-y: auto;
  padding: 28px 36px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.content::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ===== VIEWS ===== */
.view { display: none; }
.view.active { display: block; }

/* ===== HOME VIEW ===== */
.home-hero {
  text-align: center;
  padding: 48px 0 24px;
  position: relative;
}
.home-hero::before {
  content: '';
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 200px;
  background: radial-gradient(ellipse, rgba(124,108,240,0.08), rgba(45,212,191,0.04), transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.home-hero-icon {
  font-size: 52px;
  margin-bottom: 14px;
  position: relative;
  filter: drop-shadow(0 4px 12px rgba(124,108,240,0.2));
}
.home-hero h2 {
  font-family: 'Noto Serif SC', serif;
  font-size: 42px;
  font-weight: 900;
  background: linear-gradient(135deg, #fff 0%, #d8d4ff 35%, #5eead4 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
  letter-spacing: 6px;
  position: relative;
}
.home-hero p {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.8;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}
.home-hero .home-motto {
  font-family: 'Noto Serif SC', serif;
  font-size: 18px;
  color: var(--text);
  margin-top: 16px;
  line-height: 2;
  letter-spacing: 0.5px;
  font-style: italic;
}

.home-section {
  margin: 30px 0;
}
.home-section h3 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
}
.home-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 8px;
}
.home-section-header h3 {
  margin-bottom: 0;
}
.home-stats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.stat-badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: var(--transition);
  font-weight: 600;
  border: 1px solid transparent;
}
.stat-badge:hover { transform: scale(1.06); }
.stat-badge.possessed { background: rgba(45,212,191,0.15); color: #5eead4; border-color: rgba(45,212,191,0.3); }
.stat-badge.developing { background: rgba(244,114,182,0.15); color: #f9a8d4; border-color: rgba(244,114,182,0.3); }
.stat-badge.combo { background: rgba(124,108,240,0.15); color: #c4b5fd; border-color: rgba(124,108,240,0.3); }
.stat-badge.blind { background: rgba(248,113,113,0.15); color: #fca5a5; border-color: rgba(248,113,113,0.3); }

.home-guide {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.guide-card {
  background: linear-gradient(145deg, var(--card), var(--card2));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.guide-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(124,108,240,0.3), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.guide-card:hover {
  border-color: var(--border-light);
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
}
.guide-card:hover::before { opacity: 1; }
.guide-card .step-num {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  margin-bottom: 12px;
}
.guide-card .step-num.s1 { background: rgba(108,92,231,0.15); color: var(--accent2); }
.guide-card .step-num.s2 { background: rgba(0,206,201,0.15); color: var(--green); }
.guide-card .step-num.s3 { background: rgba(253,203,110,0.15); color: var(--orange); }
.guide-card h4 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.guide-card p { font-size: 12px; color: var(--text2); line-height: 1.6; }

.home-radar-wrap {
  display: flex;
  gap: 20px;
  align-items: stretch;
}
.home-radar-chart {
  flex: 0 0 auto;
  background: linear-gradient(145deg, var(--card), var(--card2));
  border-radius: var(--radius);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px;
  align-self: stretch;
  position: relative;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
}
.home-radar-chart canvas {
  display: block;
  max-width: 100%;
}
.home-radar-legend { flex: 1; min-width: 200px; overflow-y: auto; }

.home-upgrade {
  background: linear-gradient(145deg, var(--card), var(--card2));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}
.upgrade-path {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: rgba(251,191,36,0.03);
  border: 1px solid rgba(251,191,36,0.08);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  transition: var(--transition);
  cursor: pointer;
}
.upgrade-path:last-child { margin-bottom: 0; }
.upgrade-path:hover {
  border-color: rgba(251,191,36,0.25);
  background: rgba(251,191,36,0.06);
  transform: translateX(4px);
}
.upgrade-from {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 6px;
  background: rgba(253,203,110,0.1);
  font-size: 12px; color: var(--orange); font-weight: 600;
}
.upgrade-arrow { color: var(--text3); font-size: 16px; }
.upgrade-to {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 6px;
  background: rgba(0,206,201,0.1);
  font-size: 12px; color: var(--green); font-weight: 600;
}
.upgrade-reason { font-size: 12px; color: var(--text3); margin-left: auto; max-width: 200px; text-align: right; }

/* ===== ANALYZE VIEW ===== */
.analyze-layout { max-width: 900px; }

.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
.form-input {
  width: 100%;
  padding: 11px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  transition: var(--transition);
}
.form-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--glow-accent);
}
textarea.form-input { min-height: 300px; resize: vertical; line-height: 1.7; }
.file-upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; }
.file-upload-zone:hover, .file-upload-zone.drag-over { border-color: var(--accent); background: rgba(108, 92, 231, 0.05); }
.file-upload-placeholder { color: var(--text3); font-size: 14px; }
.file-upload-info { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text); }
.file-remove { margin-left: auto; cursor: pointer; opacity: 0.5; font-size: 16px; }
.file-remove:hover { opacity: 1; color: var(--red); }

.form-row { display: flex; gap: 16px; }
.form-row .form-group { flex: 1; }

.analyze-result {
  margin-top: 24px;
  padding: 22px;
  background: linear-gradient(145deg, var(--card), var(--card2));
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.analyze-result h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: var(--accent2); }
.analyze-result p { font-size: 13px; color: var(--text2); line-height: 1.7; }
.result-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
.result-item:last-child { border-bottom: none; }
.result-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  margin-right: 6px;
}
.result-tag.new { background: rgba(0,206,201,0.12); color: var(--green2); }
.result-tag.update { background: rgba(108,92,231,0.12); color: var(--accent2); }
.result-tag.possessed { background: rgba(0,206,201,0.1); color: var(--green); }
.result-tag.developing { background: rgba(253,203,110,0.1); color: var(--orange); }

/* ===== MAP VIEW ===== */
.map-layout { display: flex; gap: 24px; }

.map-col { flex: 1; min-width: 0; }
.map-col-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.map-col-header h3 { font-size: 16px; font-weight: 700; }
.map-col-header .count {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 20px;
  font-weight: 700;
}
.map-col-header.possessed .count { background: rgba(0,206,201,0.12); color: var(--green); }
.map-col-header.developing .count { background: rgba(253,203,110,0.12); color: var(--orange); }

.category-panel { margin-bottom: 8px; }
.category-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 14px;
  background: linear-gradient(135deg, var(--card), rgba(17,18,28,0.8));
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition), background 0.2s ease, transform 0.2s ease;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  user-select: none;
  border: 1px solid transparent;
}
.category-header:hover {
  background: linear-gradient(135deg, rgba(124,108,240,0.08), var(--card));
  color: var(--text);
  transform: translateX(2px);
}
.category-header:hover {
  background: var(--card2);
  border-color: var(--border);
}
.category-header.open {
  background: var(--card2);
  border-color: var(--border);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  color: var(--text);
}
.category-header .arrow {
  display: inline-block;
  transition: transform 0.2s;
  font-size: 10px;
  color: var(--text3);
  margin-right: 2px;
}
.category-header.open .arrow { transform: rotate(90deg); }
.category-header .cat-icon { font-size: 14px; }
.category-header .cat-desc {
  font-size: 11px;
  color: var(--text3);
  font-weight: 400;
  margin-left: 4px;
}

.category-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  padding: 0 0 0 0;
}
.category-body.open {
  max-height: 2000px;
  padding: 6px 0 4px 0;
}

.dim-card {
  background: linear-gradient(160deg, var(--card), var(--card2));
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 6px;
  cursor: pointer;
  position: relative;
  transition: var(--transition), transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s ease;
}
.dim-card:hover {
  border-color: rgba(124,108,240,0.35);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3), 0 0 0 1px rgba(124,108,240,0.12);
}
.dim-card.possessed { border-left: 3px solid var(--green); }

// Global loading state: tracks in-progress async operations per view
const loadingState = {

  const interval = durationMs / steps.length;
  let i = 0;
  const timer = setInterval(() => {
    if (!state.active) { clearInterval(timer); return; }
    if (i < steps.length) { state.progress = steps[i]; i++; }
    // Update sidebar queue
    updateQueueUI();
  }, interval);
  state._timer = timer;
  updateQueueUI();
}

function stopLoading(key) {
  const state = loadingState[key];
  if (!state) return;
  state.active = false;
  state.progress = 100;
  state.status = 'done';
  if (state._timer) clearInterval(state._timer);
  updateQueueUI();
  // Auto-remove from queue after 3s
  setTimeout(() => {
    if (state.status === 'done') { state.status = null; updateQueueUI(); }
  }, 3000);
}

function stopLoadingError(key, msg) {
  const state = loadingState[key];
  if (!state) return;
  state.active = false;
  state.status = 'error';
  state.errorMsg = msg || '失败';
  if (state._timer) clearInterval(state._timer);
  updateQueueUI();
  setTimeout(() => {
    if (state.status === 'error') { state.status = null; updateQueueUI(); }
  }, 5000);
}

function updateQueueUI() {
  const list = document.getElementById('queueList');
  const pulseEl = document.getElementById('queuePulse');
  if (!list) return;
  const items = Object.entries(loadingState).filter(([, s]) => s.status && s.status !== null);
  if (pulseEl) pulseEl.classList.toggle('active', items.some(([, s]) => s.status === 'running'));
  if (items.length === 0) {
    list.innerHTML = '<div style="font-size:10px;color:var(--text3);text-align:center;padding:8px 0">空闲</div>';
    return;
  }
  list.innerHTML = items.map(([key, s]) => {
    const dotClass = s.status === 'running' ? 'running' : s.status === 'error' ? 'error' : 'done';
    const fillClass = s.status === 'done' ? 'done' : s.status === 'error' ? 'error' : '';
    const pct = s.status === 'done' ? 100 : s.status === 'error' ? s.progress || 0 : s.progress;
    const label = s.status === 'done' ? '&#10003; 完成' : s.status === 'error' ? '&#10007; ' + (s.errorMsg || '失败') : s.label;
    return `<div class="queue-item">
      <div class="queue-item-label"><span class="dot ${dotClass}"></span>${label}</div>
      <div class="queue-progress"><div class="queue-progress-fill ${fillClass}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderLoadingProgress(key) {
  const state = loadingState[key];
  if (!state || !state.active) return '';
  return `<div class="loading-with-progress" data-loading="${key}">
    <div class="spinner" style="width:24px;height:24px;border-width:3px"></div>
    <span>${state.label}</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${state.progress}%"></div></div>
  </div>`;
}

// ============ API ============
let currentUser = null;

async function api(url, method = 'GET', body = null, timeoutMs = 600000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  const opts = { method, headers: { 'Content-Type': 'application/json' }, signal: controller.signal, credentials: 'same-origin' };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(url, opts);
    if (res.status === 401) {
      currentUser = null;
      showLoginPage();
      throw new Error('登录已过期，请重新登录');
    }
    if (!res.ok) {
      const text = await res.text().catch(() => '');
      throw new Error(text || `HTTP ${res.status}`);
    }
    const data = await res.json();
    return data;
  } finally {
    clearTimeout(timer);
  }
}

async function loadMap() {
  mapData = await api('/api/map');
  return mapData;
}

  updateCount('navCountPaths', (mapData?.developmentPaths || []).length);

}

function goToDimension(dimId) {
  switchView('map');
  setTimeout(() => {
    const card = document.querySelector(`[data-dim-id="${dimId}"]`);
    if (card) {
      // Auto-expand the collapsed category containing this card
      const categoryBody = card.closest('.category-body');
      if (categoryBody && !categoryBody.classList.contains('open')) {
        categoryBody.classList.add('open');
        const header = categoryBody.previousElementSibling;
        if (header && !header.classList.contains('open')) {
          header.classList.add('open');
        }
      }
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.style.boxShadow = '0 0 0 2px var(--accent), 0 0 20px rgba(108,92,231,0.3)';
      setTimeout(() => { card.style.boxShadow = ''; }, 2000);
    }
  }, 300);
}

function goToPath(pathId) {
  selectedPathId = pathId;
  switchView('paths');
}

function goToBlindspot(blindId) {
  switchView('blindspots');
  setTimeout(() => {
    const card = document.querySelector(`[data-blind-id="${blindId}"]`);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
  renderView(view);
}

async function renderView(view) {
  const content = document.getElementById('content');

  if (view !== 'analyze' && view !== 'settings') {
    if (!mapData) await loadMap();
  }

  switch (view) {
    case 'home': renderHome(content); break;
    case 'analyze': renderAnalyze(content); break;
    case 'map': renderMap(content); break;
    case 'combos': renderCombos(content); break;
    case 'blindspots': renderBlindspots(content); break;
    case 'paths': renderPaths(content); break;
    case 'timeline': renderTimeline(content); break;
    case 'settings': renderSettings(content); break;
  }
}

function esc(str) {

  const s = String(str);
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function getCategoryById(catId) {
  return (mapData?.categories || []).find(c => c.id === catId);

function getCategoryName(catId) {

  return cat ? cat.name : '未分类';
}
function getCategoryIcon(catId) {
  const cat = getCategoryById(catId);
  return cat ? cat.icon : '📌';
}
function getCategoryDesc(catId) {
  const cat = getCategoryById(catId);
  return cat ? cat.description : '';
}
function getDimById(dimId) {
  return (mapData?.dimensions || []).find(d => d.id === dimId);
}
function getDimName(dimId) {
  const dim = getDimById(dimId);
  return dim ? dim.name : dimId;
}
function getBlindById(blindId) {
  return (mapData?.blindSpots || []).find(b => b.id === blindId);
}

function buildCategoryAxes() {
  const allCategories = (mapData.categories || []).filter(cat => (cat.dimIds || []).length > 0);
  const blindspots = mapData.blindSpots || [];
  return allCategories.map(cat => {
    const catDimIds = new Set(cat.dimIds || []);
    const relatedBlinds = blindspots.filter(b => {
      const rDims = b.relatedDimensions || [];
      const rArr = typeof rDims === 'string' ? rDims.split(/\s+/) : rDims;
      return rArr.some(d => catDimIds.has(d));
    });
    return {
      id: cat.id,
      name: cat.name,
      description: cat.description,
      icon: cat.icon,
      dimIds: cat.dimIds,
      blindIds: relatedBlinds.map(b => b.id)
    };
  });
}

// Get developing dimensions that have upgrade potential (have development paths)
function getUpgradePaths() {
  const paths = mapData?.developmentPaths || [];
  return paths.filter(p => {
    const dim = getDimById(p.targetDimension);
    // Path targets a developing dimension or a blind spot
    return dim?.status === 'developing' || p.targetDimension.startsWith('blind_');
  });
}

          <input type="file" id="fileInput" accept=".txt,.text" style="display:none">
        </div>
      </div>
      <button class="btn primary" id="analyzeBtn" onclick="doAnalyze()">开始分析</button>
      <div id="analyzeResult"></div>
    </div>`;

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.onclick = () => fileInput.click();
  dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
  dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
  dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('drag-over'); selectFile(e.dataTransfer.files[0]); };
  fileInput.onchange = () => { if (fileInput.files[0]) selectFile(fileInput.files[0]); };
}

let selectedFile = null;

function selectFile(file) {
  if (!file) return;
  selectedFile = file;
  document.getElementById('filePlaceholder').style.display = 'none';
  document.getElementById('fileInfo').style.display = 'flex';
  document.getElementById('fileName').textContent = file.name;
  const kb = (file.size / 1024).toFixed(1);
  const mb = (file.size / 1024 / 1024).toFixed(1);
  document.getElementById('fileSize').textContent = file.size > 1024 * 1024 ? ` (${mb} MB)` : ` (${kb} KB)`;
}

function clearFile() {
  selectedFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('filePlaceholder').style.display = '';
  document.getElementById('fileInfo').style.display = 'none';
}

async function doAnalyze() {
  const btn = document.getElementById('analyzeBtn');
  const resultEl = document.getElementById('analyzeResult');
  const speakerName = document.getElementById('speakerName').value.trim();
  const sourceName = document.getElementById('sourceName').value.trim();

  if (!selectedFile || !speakerName) {
    toast('请选择录音转写文件并填写说话人名称', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = '分析中...';
  loadingState.analyze = loadingState.analyze || { label: '', progress: 0, active: false, status: null };
  loadingState.analyze.label = '正在分析录音...';
  simulateProgress('analyze', 30000);
  resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>AI 正在深度分析行为模式...</div>';

  try {
    // 使用 FormData 直接上传文件，不经过 textarea，不会截断
    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('speakerName', speakerName);
    formData.append('sourceName', sourceName);
    formData.append('date', new Date().toISOString().split('T')[0]);

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 600000);
    const res = await fetch('/api/analyze', {
      method: 'POST',
      body: formData,
      signal: controller.signal,
      credentials: 'same-origin',
    });
    clearTimeout(timer);

    if (res.status === 401) {
      currentUser = null;
      showLoginPage();
      throw new Error('登录已过期，请重新登录');
    }
    if (!res.ok) {
      const text = await res.text().catch(() => '');
      throw new Error(text || `HTTP ${res.status}`);
    }

    const result = await res.json();
    mapData = result.map;
    stopLoading('analyze');
    toast('分析完成', 'success');

    // 级联更新：清除派生数据，下次访问时重新生成
    delete mapData.combinations;
    delete mapData.blindSpots;
    delete mapData.paths;
    updateSidebarCounts();
    if (currentView === 'home') renderHome();
    if (currentView === 'combos') renderCombos();
    if (currentView === 'blindspots') renderBlindspots();
    if (currentView === 'paths') renderPaths();

    const updates = result.updates;
    let html = `<div class="analyze-result"><h3>分析结果</h3><p>${esc(result.summary)}</p>`;

    if (updates.newDims && updates.newDims.length > 0) {
      html += `<div class="result-item"><strong>新增维度:</strong><br>`;
      updates.newDims.forEach(d => {
        html += `<span class="result-tag new">NEW</span><span class="result-tag ${d.status}">${d.status === 'possessed' ? '已具备' : '待发展'}</span>${esc(d.name)}<br>`;
      });
      html += '</div>';
    }

    if (updates.updatedDims && updates.updatedDims.length > 0) {
      html += `<div class="result-item"><strong>更新维度:</strong><br>`;
      updates.updatedDims.forEach(d => {
        html += `<span class="result-tag update">UPDATE</span>${esc(d.name)} (${esc(d.action)})<br>`;
      });
      html += '</div>';
    }

    if (updates.mergeSuggestions && updates.mergeSuggestions.length > 0) {
      html += `<div class="result-item"><strong>合并建议:</strong><br>`;
      updates.mergeSuggestions.forEach(m => {
        html += `${esc(m.suggestedName)}: ${esc(m.reason)}<br>`;
      });
      html += '</div>';
    }

    html += '</div>';
    resultEl.innerHTML = html;
  } catch (e) {
    toast(e.message, 'error');
    stopLoadingError('analyze', e.message);
    resultEl.innerHTML = `<div class="analyze-result"><h3>分析失败</h3><p>${esc(e.message)}</p></div>`;
  }

  btn.disabled = false;
  btn.textContent = '开始分析';
}

// ============ MAP VIEW ============
function renderMap(el) {
  const possessed = (mapData?.dimensions || []).filter(d => d.status === 'possessed');
  const developing = (mapData?.dimensions || []).filter(d => d.status === 'developing');

  // Group by category
  const possessedByCat = groupByCategory(possessed);
  const developingByCat = groupByCategory(developing);

  let deleteBarHtml = `<div class="delete-bar" id="deleteBar">
    <span class="delete-bar-label" id="deleteLabel">待删除: 0 个维度</span>
    <div id="deleteTags"></div>
    <button class="btn danger" onclick="applyDelete()">确认删除</button>
  </div>`;

  let html = deleteBarHtml + '<div class="map-layout">';

  // Possessed column
  html += '<div class="map-col"><div class="map-col-header possessed"><h3>已具备</h3><span class="count">' + possessed.length + '</span></div>';
  html += renderCategoryPanels(possessedByCat, 'possessed');
  html += '</div>';

  // Developing column
  html += '<div class="map-col"><div class="map-col-header developing"><h3>待发展</h3><span class="count">' + developing.length + '</span></div>';
  html += renderCategoryPanels(developingByCat, 'developing', true);
  html += '</div>';

  html += '</div>';

  if ((mapData?.dimensions || []).length === 0) {
    html = deleteBarHtml + `<div class="empty-state"><div class="icon">&#128506;</div><h3>还没有能力维度</h3><p>去"分析录音"页面提交录音文本，开始构建你的能力图谱</p></div>`;
  }

  el.innerHTML = html;
  deleteQueue = [];
}

function groupByCategory(dims) {
  const groups = {};
  dims.forEach(d => {
    const catId = d.category || 'uncategorized';
    if (!groups[catId]) groups[catId] = [];
    groups[catId].push(d);
  });
  return groups;
}

function renderCategoryPanels(byCat, type, forceOpen) {
  let html = '';
  // Use category order from mapData to maintain consistent ordering
  const catOrder = (mapData?.categories || []).map(c => c.id);
  const allCatIds = [...new Set([...catOrder, ...Object.keys(byCat)])];

  for (const catId of allCatIds) {
    if (!byCat[catId]) continue;
    const dims = byCat[catId];
    const catDesc = getCategoryDesc(catId);

    html += `<div class="category-panel">
      <div class="category-header${forceOpen ? ' open' : ''}" onclick="toggleCategory(this)">
        <span class="arrow">&#9654;</span>
        <span class="cat-icon">${getCategoryIcon(catId)}</span>
        <span>${getCategoryName(catId)}</span>
        ${catDesc ? `<span class="cat-desc">${catDesc}</span>` : ''}
        <span style="margin-left:auto;font-size:11px;color:var(--text3)">${dims.length}</span>
      </div>
      <div class="category-body${forceOpen ? ' open' : ''}">`;

    dims.forEach(d => {
      const hasUpgradePath = (mapData?.developmentPaths || []).some(p => p.targetDimension === d.id);
      html += `<div class="dim-card ${d.status}" data-dim-id="${d.id}" onclick="showDimDetail('${d.id}')">
        <div class="dim-card-head">
          <span class="dim-card-name">${esc(d.name)}</span>
          <span class="dim-stars">${getStars(d.evidence?.length || 0)}</span>
          ${d.status === 'developing' && hasUpgradePath ? '<span class="dim-upgrade-badge">&#127919; 可升级</span>' : ''}
        </div>
        <div class="dim-card-desc">${esc(d.description)}</div>
        <button class="dim-card-delete" onclick="event.stopPropagation();queueDelete('${d.id}','${esc(d.name).replace(/'/g, "\\'")}')">&times;</button>
      </div>`;
    });
    html += '</div></div>';
  }
  return html;
}

function toggleCategory(el) {
  el.classList.toggle('open');
  const body = el.nextElementSibling;
  body.classList.toggle('open');
}

function showDimDetail(dimId) {
  const d = getDimById(dimId);
  if (!d) return;

  const hasUpgradePath = (mapData?.developmentPaths || []).some(p => p.targetDimension === d.id);
  const upgradePath = (mapData?.developmentPaths || []).find(p => p.targetDimension === d.id);

  let html = `<h3>${esc(d.name)}</h3>
    <span class="modal-status ${d.status}">${d.status === 'possessed' ? '已具备' : '待发展'}</span>
    <span class="dim-stars" style="font-size:14px">${getStars(d.evidence?.length || 0)}</span>
    <span style="font-size:11px;color:var(--text3);margin-left:4px">条证据</span>
    <div class="modal-desc">${esc(d.description)}</div>`;

  // Upgrade path for developing dimensions
  if (d.status === 'developing' && upgradePath) {
    html += `<div class="modal-upgrade">
      <h4>&#127919; 升级路径</h4>
      <p><strong>当前缺口：</strong>${esc(upgradePath.currentGap)}</p>
      <p style="margin-top:6px"><strong>预期变化：</strong>${esc(upgradePath.expectedOutcome)}</p>
      <p style="margin-top:6px"><strong>杠杆维度：</strong>${esc((upgradePath.leveragedFrom || []).map(id => getDimName(id))).join(' / ')}</p>
    </div>`;
  }

  if (d.relatedTo && d.relatedTo.length > 0) {
    html += `<div class="modal-section"><h4>关联维度</h4><div class="related-tags">`;
    d.relatedTo.forEach(rid => {
      html += `<span class="related-tag" onclick="closeModal();setTimeout(()=>showDimDetail('${rid}'),100)">${esc(getDimName(rid))}</span>`;
    });
    html += '</div></div>';
  }

  html += `<div class="modal-section"><h4>行为证据 (${d.evidence?.length || 0})</h4>`;
  (d.evidence || []).forEach((ev, idx) => {
    html += `<div class="evidence-item ${d.status}">
      ${ev.rawQuote ? `<div class="evidence-raw">${esc(ev.rawQuote)}</div>` : ''}
      <div class="evidence-quote" id="ev-quote-${dimId}-${idx}">${esc(ev.quote)}</div>
      <div class="evidence-actions">
        <button class="btn" style="font-size:10px;padding:2px 8px" onclick="editEvidence('${dimId}',${idx})">编辑</button>
        ${ev.corrected ? `<button class="btn" style="font-size:10px;padding:2px 8px" onclick="revertEvidence('${dimId}',${idx})">还原</button>` : ''}
      </div>
      <div class="evidence-meta">${esc(ev.source)} &middot; ${esc(ev.speaker)} &middot; ${esc(ev.date)}</div>
      ${ev.interpretation ? `<div class="evidence-interpretation">${esc(ev.interpretation)}</div>` : ''}
      ${ev.corrected ? '<div class="evidence-corrected">&#10003; 已编辑</div>' : ''}
    </div>`;
  });
  html += '</div>';

  openModal(html);
}

// ---- Evidence inline editing ----
function editEvidence(dimId, evIdx) {
  const d = getDimById(dimId);
  if (!d || !d.evidence[evIdx]) return;
  const ev = d.evidence[evIdx];
  const quoteEl = document.getElementById(`ev-quote-${dimId}-${evIdx}`);
  if (!quoteEl) return;

  // Replace text with textarea
  const textarea = document.createElement('textarea');
  textarea.value = ev.quote;
  textarea.className = 'evidence-edit-textarea';
  textarea.rows = 3;
  quoteEl.replaceWith(textarea);
  textarea.focus();

  // Replace edit button with save/cancel
  const actionsEl = textarea.parentElement.querySelector('.evidence-actions');
  if (!actionsEl) return;
  const origHtml = actionsEl.innerHTML;
  actionsEl.innerHTML = `
    <button class="btn primary" style="font-size:10px;padding:2px 8px" onclick="saveEvidence('${dimId}',${evIdx},this)">保存</button>
    <button class="btn" style="font-size:10px;padding:2px 8px" onclick="cancelEditEvidence('${dimId}',${evIdx},this)">取消</button>
  `;
  actionsEl.dataset.origHtml = origHtml;
}

async function saveEvidence(dimId, evIdx, btnEl) {
  const textarea = btnEl.closest('.evidence-item').querySelector('.evidence-edit-textarea');
  if (!textarea) return;
  const newQuote = textarea.value.trim();
  if (!newQuote) { toast('引用文本不能为空', 'error'); return; }

  try {
    await api('/api/evidence/edit', 'POST', {
      dimensionId: dimId,
      evidenceIndex: evIdx,
      quote: newQuote
    });
    // Update local data
    const d = getDimById(dimId);
    if (d && d.evidence[evIdx]) {
      if (!d.evidence[evIdx].rawQuote) d.evidence[evIdx].rawQuote = d.evidence[evIdx].quote;
      d.evidence[evIdx].quote = newQuote;
      d.evidence[evIdx].corrected = true;
    }
    toast('已保存', 'success');
    // Re-render the detail modal
    showDimDetail(dimId);
  } catch (e) {
    toast(e.message, 'error');
  }
}

function cancelEditEvidence(dimId, evIdx, btnEl) {
  // Just re-render the detail modal
  showDimDetail(dimId);
}

async function revertEvidence(dimId, evIdx) {
  try {
    await api('/api/correct/revert', 'POST', {
      dimensionId: dimId,
      evidenceIndex: evIdx
    });
    // Update local data
    const d = getDimById(dimId);
    if (d && d.evidence[evIdx] && d.evidence[evIdx].rawQuote) {
      d.evidence[evIdx].quote = d.evidence[evIdx].rawQuote;
      delete d.evidence[evIdx].rawQuote;
      d.evidence[evIdx].corrected = false;
    }
    toast('已还原', 'success');
    showDimDetail(dimId);
  } catch (e) {
    toast(e.message, 'error');
  }
}

function queueDelete(dimId, dimName) {
  if (deleteQueue.includes(dimId)) return;
  deleteQueue.push(dimId);
  updateDeleteBar();
}

function removeFromDelete(dimId) {
  deleteQueue = deleteQueue.filter(id => id !== dimId);
  updateDeleteBar();
}

function updateDeleteBar() {
  const bar = document.getElementById('deleteBar');
  const label = document.getElementById('deleteLabel');
  const tags = document.getElementById('deleteTags');
  if (!bar) return;

  bar.classList.toggle('visible', deleteQueue.length > 0);
  label.textContent = `待删除: ${deleteQueue.length} 个维度`;
  tags.innerHTML = deleteQueue.map(id =>
    `<span class="delete-tag">${esc(getDimName(id))}<span class="x" onclick="removeFromDelete('${id}')">&times;</span></span>`
  ).join('');
}

async function applyDelete() {
  if (deleteQueue.length === 0) return;
  try {
    const result = await api('/api/dimensions/delete', 'POST', { dimensionIds: deleteQueue });
    mapData = result.map;
    deleteQueue = [];
    toast('删除成功', 'success');
    renderView('map');
  } catch (e) {
    toast(e.message, 'error');
  }
}

function renderBlindspots(el) {
  const blindLoading = renderLoadingProgress('blindspots');

  if (blinds.length === 0) {

    <div id="blindDeleteTags"></div>
    <button class="btn danger" onclick="applyBlindDelete()">确认删除</button>
  </div>`;

  let html = deleteBarHtml + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h3 style="margin:0">感知盲区</h3><button class="btn primary" style="font-size:11px;padding:4px 12px" onclick="genBlindspots()">刷新盲区探测</button></div><div class="blinds-grid">';
  blinds.forEach(b => {
    const isSelected = blindDeleteQueue.includes(b.id);
    html += `<div class="blind-card ${isSelected ? 'dim-selected' : ''}" data-blind-id="${b.id}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <span class="blind-confidence ${b.confidence}">置信度: ${esc(b.confidence)}</span>
        <span class="dim-delete-btn" style="margin-left:auto" onclick="toggleBlindDelete('${b.id}', event)">&#10005;</span>
      </div>
      <h3>${esc(b.name)}</h3>
      <p>${esc(b.description)}</p>`;

    (b.evidence || []).forEach(ev => {
      html += `<div class="blind-evidence-card"><b>场景:</b> ${esc(ev.context)}<br><b>缺口:</b> ${esc(ev.gap)}</div>`;
    });

    if (b.relatedDimensions && b.relatedDimensions.length > 0) {
      const relIds = Array.isArray(b.relatedDimensions) ? b.relatedDimensions : (typeof b.relatedDimensions === 'string' ? b.relatedDimensions.split(' ').filter(Boolean) : []);
      html += `<div class="blind-related"><span class="blind-related-label">关联: </span>`;

        const name = getDimName(id);
        if (name !== id) {
          html += `<span class="related-tag" onclick="showDimDetail('${id}')">${esc(name)}</span>`;
        }
      });
      html += '</div>';
    }

    html += '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function toggleBlindDelete(blindId, event) {
  event.stopPropagation();
  const idx = blindDeleteQueue.indexOf(blindId);
  if (idx === -1) {
    blindDeleteQueue.push(blindId);
  } else {
    blindDeleteQueue.splice(idx, 1);
  }
  const bar = document.getElementById('blindDeleteBar');
  if (bar) {
    if (blindDeleteQueue.length === 0) {
      bar.style.display = 'none';
    } else {
      bar.style.display = 'flex';
      document.getElementById('blindDeleteLabel').textContent = '待删除: ' + blindDeleteQueue.length + ' 个盲区';
    }
  }
  // Update card styles
  document.querySelectorAll('.blind-card').forEach(card => {
    const id = card.dataset.blindId;
    card.classList.toggle('dim-selected', blindDeleteQueue.includes(id));
  });
}

async function applyBlindDelete() {

    const result = await api('/api/blindspots/delete', 'POST', { blindIds: blindDeleteQueue });

// ============ PATHS VIEW ============
function renderPaths(el) {
  const pathsLoading = renderLoadingProgress('paths');
  if (pathsLoading) { el.innerHTML = pathsLoading; return; }
  const paths = mapData?.developmentPaths || [];
  if (paths.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="icon">&#127793;</div><h3>还没有修炼路径</h3><p>有待发展维度或盲区后，点击"刷新修炼路径"生成</p><button class="btn primary" style="margin-top:16px" onclick="genPaths()">刷新修炼路径</button></div>`;
    return;
  }

  let html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h3 style="margin:0">修炼路径</h3><button class="btn primary" style="font-size:11px;padding:4px 12px" onclick="genPaths()">刷新修炼路径</button></div><div class="paths-list">';
  paths.forEach(p => {
    const isBlind = p.targetDimension && p.targetDimension.startsWith('blind_');
    const leveragedFrom = Array.isArray(p.leveragedFrom) ? p.leveragedFrom : (typeof p.leveragedFrom === 'string' ? p.leveragedFrom.split(' ').filter(Boolean) : []);
    const steps = Array.isArray(p.steps) ? p.steps : [];

    html += `<div class="path-card" id="path-${p.id}">
      <div class="path-header">
        <h3>${isBlind ? '&#128065; ' : '&#127793; '}${esc(p.targetName)}</h3>
        <div class="path-gap">${esc(p.currentGap)}</div>
        <div class="path-leverages">杠杆: ${leveragedFrom.map(id =>
          `<span class="path-leverage-tag">${esc(getDimName(id))}</span>`
        ).join('')}</div>
      </div>`;

    // Steps with full detail
    if (steps.length > 0) {
      html += '<div class="path-steps">';
      steps.forEach((s, i) => {
        html += `<div class="path-step">
          <div class="path-step-num">${i + 1}</div>
          <div class="path-step-content">
            <h4>${esc(s.action)}</h4>
            ${s.detail ? `<div class="detail">${esc(s.detail)}</div>` : ''}
            ${s.leverage ? `<span class="leverage">&#127793; ${esc(s.leverage)}</span>` : ''}
          </div>
        </div>`;
      });
      html += '</div>';
    }

    if (p.expectedOutcome) {
      html += `<div class="path-outcome"><strong>预期变化:</strong> ${esc(p.expectedOutcome)}</div>`;
    }

    html += '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
  if (selectedPathId) {
    const target = document.getElementById('path-' + selectedPathId);
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      target.style.boxShadow = '0 0 0 2px var(--orange), 0 0 20px rgba(253,203,110,0.3)';
      setTimeout(() => { target.style.boxShadow = ''; }, 2000);
    }
    selectedPathId = null;
  }
}

function drawRadarOnCanvas(canvas, axes, overrideSize) {
  if (!canvas || !axes || axes.length < 3) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  let size = overrideSize || Math.min(rect.width, rect.height);
  if (!size || size < 100) size = 300;
  const bottomPad = 45; // extra space for legend
  canvas.width = size * 2; canvas.height = (size + bottomPad) * 2;
  canvas.style.width = size + 'px'; canvas.style.height = (size + bottomPad) + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  const cx = size / 2, cy = size / 2;
  const maxR = size * 0.30;
  const n = axes.length;
  if (n < 3) return;
  const angleStep = (Math.PI * 2) / n;

  // Calculate max evidence across all axes for normalization
  let maxTotalEvid = 0;
  axes.forEach(axis => {
    const totalEvid = (axis.dimIds || []).reduce((sum, id) => {
      const dim = getDimById(id);
      return sum + (dim?.evidence?.length || 0);
    }, 0);
    if (totalEvid > maxTotalEvid) maxTotalEvid = totalEvid;
  });
  if (maxTotalEvid === 0) maxTotalEvid = 1;

  // Grid rings
  for (let ring = 1; ring <= 4; ring++) {
    const r = (maxR / 4) * ring;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const a = -Math.PI / 2 + i * angleStep;
      const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.stroke();
    // Ring labels
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = '9px "Noto Sans SC"';
    ctx.textAlign = 'left';
    ctx.fillText(Math.round(ring / 4 * maxTotalEvid) + '', cx + 3, cy - r + 10);
  }

  // Axis lines
  for (let i = 0; i < n; i++) {
    const a = -Math.PI / 2 + i * angleStep;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a) * maxR, cy + Math.sin(a) * maxR);
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.stroke();
  }

  const colors = RADAR_COLORS;

  // Possessed data polygon
  const possessedPoints = axes.map(axis => {
    const dimIds = (axis.dimIds || []).filter(id => { const d = getDimById(id); return d && d.status === 'possessed'; });
    const totalEvid = dimIds.reduce((sum, id) => {
      const dim = getDimById(id);
      return sum + (dim?.evidence?.length || 0);
    }, 0);
    return Math.max(totalEvid / maxTotalEvid, 0.08);
  });

  ctx.beginPath();
  for (let i = 0; i <= n; i++) {
    const idx = i % n;
    const a = -Math.PI / 2 + idx * angleStep;
    const r = possessedPoints[idx] * maxR;
    const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.fillStyle = 'rgba(108,92,231,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(108,92,231,0.7)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // "己所向" overlay = 己所能 + 待发展 + 盲区 = full scope (pink dashed)
  const aspPoints = axes.map((axis, idx) => {
    let total = possessedPoints[idx];
    // Developing contribution
    const devIds = (axis.dimIds || []).filter(id => { const d = getDimById(id); return d && d.status === 'developing'; });
    if (devIds.length > 0) {
      const totalEvid = devIds.reduce((sum, id) => {
        const dim = getDimById(id);
        return sum + (dim?.evidence?.length || 0);
      }, 0);
      total += Math.max(totalEvid / maxTotalEvid, 0.08);
    }
    // Blind contribution
    const blindIds = axis.blindIds || [];
    if (blindIds.length > 0) {
      total += Math.min(0.15 * blindIds.length, 0.3);
    }
    return Math.min(total, 1.0);
  });

  const hasAsp = aspPoints.some(v => v > 0);
  if (hasAsp) {
    ctx.beginPath();
    let started = false;
    for (let i = 0; i <= n; i++) {
      const idx = i % n;
      if (aspPoints[idx] === 0) continue;
      const a = -Math.PI / 2 + idx * angleStep;
      const r = aspPoints[idx] * maxR;
      const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
      if (!started) { ctx.moveTo(x, y); started = true; } else { ctx.lineTo(x, y); }
    }
    ctx.fillStyle = 'rgba(244,114,182,0.08)';
    ctx.fill();
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(244,114,182,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Dots + labels
  for (let i = 0; i < n; i++) {
    const a = -Math.PI / 2 + i * angleStep;
    const r = possessedPoints[i] * maxR;
    const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
    // Glow
    ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.fillStyle = colors[i % colors.length] + '30'; ctx.fill();
    // Dot
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = colors[i % colors.length]; ctx.fill();
    // 己所向 dot
    if (aspPoints[i] > 0) {
      const ar = aspPoints[i] * maxR;
      const ax2 = cx + Math.cos(a) * ar, ay = cy + Math.sin(a) * ar;
      ctx.beginPath(); ctx.arc(ax2, ay, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = '#f9a8d4'; ctx.fill();
    }
    // Label
    const lx = cx + Math.cos(a) * (maxR + 28), ly = cy + Math.sin(a) * (maxR + 28);
    ctx.fillStyle = '#e4e4f0'; ctx.font = '700 11px "Noto Sans SC"';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(axes[i].name, lx, ly);
  }

  // Legend mini
  const legY = size + 6;
  ctx.fillStyle = 'rgba(108,92,231,0.7)';
  ctx.fillRect(8, legY, 10, 3);
  ctx.fillStyle = '#fff'; ctx.font = '10px "Noto Sans SC"'; ctx.textAlign = 'left';
  ctx.fillText('己所能', 22, legY + 4);
  // 己所向 legend line
  ctx.beginPath(); ctx.moveTo(8, legY + 16); ctx.lineTo(18, legY + 16);
  ctx.setLineDash([4, 4]); ctx.strokeStyle = 'rgba(244,114,182,0.6)'; ctx.lineWidth = 2; ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = '#fff'; ctx.font = '10px "Noto Sans SC"';
  ctx.fillText('己所向', 22, legY + 20);
}

async function exportData() {
  try {
    const res = await fetch('/api/map/export');
    const blob = await res.blob();
    // Extract filename from Content-Disposition header
    const disposition = res.headers.get('Content-Disposition') || '';
    const match = disposition.match(/filename="?([^";\n]+)"?/);
    const filename = match ? match[1] : 'growth-force-field-backup.json';
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    link.click();
    URL.revokeObjectURL(url);
    toast('数据已导出', 'success');
  } catch (e) {
    toast('导出失败: ' + e.message, 'error');
  }
}

async function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!confirm('导入会合并新维度（不覆盖已有数据），确定要导入吗？')) {
    event.target.value = '';
    return;
  }
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    const result = await api('/api/map/import', 'POST', data);
    mapData = result.map;
    toast(`导入完成，新增 ${result.importedDimensions} 个维度`, 'success');
    renderView('settings');
  } catch (e) {
    toast('导入失败: ' + e.message, 'error');
  }
  event.target.value = '';
}

          </div>
          <div class="login-field">
            <label>密码</label>
            <input type="password" id="loginPass" autocomplete="current-password" placeholder="请输入密码" required>
          </div>
          <div id="loginError" class="login-error" style="display:none"></div>
          <button type="submit" id="loginBtn">登 录</button>
        </form>
        <p class="login-hint">首次使用请登录管理员账号 (admin / admin123456)</p>
      </div>
    </div>`;
  document.getElementById('loginForm').addEventListener('submit', handleLogin);
  document.getElementById('loginUser').focus();
}

async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  if (!username || !password) { errEl.textContent = '请输入用户名和密码'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = '登录中...'; errEl.style.display = 'none';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '登录失败');
    currentUser = data.user;
    initApp();
  } catch (e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = '登 录';
  }
}

async function handleLogout() {
  try { await api('/api/auth/logout', 'POST'); } catch(e) {}
  currentUser = null;
  showLoginPage();
}

function initApp() {
  document.getElementById('app').innerHTML = mainAppHTML;
  bindNavigation();
  // Add logout button
  const footer = document.querySelector('.sidebar-footer');
  if (footer) {
    const logoutBtn = document.createElement('button');
    logoutBtn.className = 'sidebar-logout';
    logoutBtn.textContent = '退出登录 (' + currentUser.username + ')';
    logoutBtn.onclick = handleLogout;
    footer.parentNode.insertBefore(logoutBtn, footer);
  }
  loadMap().then(() => renderView('home'));
}

// ============ INIT ============
fetch('/api/auth/me', { credentials: 'same-origin' })
  .then(r => {
    if (r.ok) return r.json();
    throw new Error('not logged in');
  })
  .then(data => {
    currentUser = data.user;
    initApp();
  })
  .catch(() => {
    showLoginPage();
  });

// Redraw radar charts on window resize
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (currentView === 'home') {
      const homeCanvas = document.getElementById('homeRadarCanvas');
      const homeRadarWrap = document.querySelector('.home-radar-wrap');
      const catAxes = buildCategoryAxes();
      if (homeCanvas && homeRadarWrap && catAxes.length >= 3) {
        const legendEl = homeRadarWrap.querySelector('.home-radar-legend');
        const targetH = legendEl ? legendEl.offsetHeight : 400;
        const size = Math.max(200, Math.min(targetH, window.innerWidth * 0.4));
        drawRadarOnCanvas(homeCanvas, catAxes, size);
      }
    }
  }, 200);
});
</script>
